<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Company — Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#f0f2f5;color:#1f2328;line-height:1.5;display:flex;flex-direction:column}
header{background:#075e54;border-bottom:none;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
header h1{font-size:1.1em;color:#fff}
.hdr-status{display:flex;gap:10px;align-items:center;font-size:0.82em;color:rgba(255,255,255,.85)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px}
.dot.ok{background:#1a7f37}.dot.err{background:#cf222e}.dot.load{background:#9a6700}
.layout{flex:1;display:grid;grid-template-columns:250px 1fr 300px;gap:8px;padding:8px;overflow:hidden}
@media(max-width:1100px){.layout{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}}
.col{display:flex;flex-direction:column;gap:8px;overflow:hidden}
.card{background:#fff;border:1px solid #d1d9e0;border-radius:6px;overflow:hidden;min-height:0}
.card-hdr{padding:6px 10px;font-weight:600;font-size:0.82em;border-bottom:1px solid #d1d9e0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.card-body{padding:8px 10px}
.card-hdr .count{background:#ddf4ff;color:#0550ae;border-radius:8px;padding:0 6px;font-size:0.75em}

/* Agent cards */
.agent{padding:8px 10px;border-bottom:1px solid #f0f2f5;cursor:pointer;display:flex;gap:8px;align-items:center;transition:background .1s}
.agent:hover{background:#f6f8fa}
.agent:last-child{border-bottom:none}
.agent .ord{width:22px;height:22px;border-radius:50%;background:#ddf4ff;color:#0550ae;font-size:0.7em;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.agent .info{flex:1;min-width:0}
.agent .name{font-weight:600;font-size:0.85em}
.agent .meta{font-size:0.72em;color:#59636e}
.agent.active{background:#f0fff4;border-left:2px solid #1a7f37}
.agent .prompt-len{font-size:0.68em;color:#1a7f37}

/* Tasks */
.task{padding:6px 10px;border-bottom:1px solid #f0f2f5;font-size:0.85em}
.task:last-child{border-bottom:none}
.task .t-name{font-weight:500}
.task .t-meta{font-size:0.75em;color:#59636e;display:flex;gap:6px}
.badge{display:inline-block;padding:0 6px;border-radius:8px;font-size:0.72em;font-weight:600}
.b-p1{background:#ffebe9;color:#cf222e}.b-p2{background:#fff8c5;color:#9a6700}.b-p3{background:#f0f2f5;color:#59636e}
.b-open{background:#ddf4ff;color:#0550ae}.b-done{background:#dafbe1;color:#1a7f37}.b-progress{background:#fff8c5;color:#9a6700}

/* Worker log */
.log-box{background:#1f2328;color:#c9d1d9;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:0.72em;padding:8px;max-height:250px;overflow-y:auto;line-height:1.6}
.log-box .ok{color:#3fb950}.log-box .err{color:#f85149}.log-box .q{color:#58a6ff}

/* Questions */
.question{padding:8px 10px;border-bottom:1px solid #f0f2f5;font-size:0.85em}
.question:last-child{border-bottom:none}
.question .q-from{font-size:0.72em;color:#0550ae;font-weight:600}
.question .q-text{margin:2px 0}
.question .q-to{font-size:0.72em;color:#59636e}

/* Actions */
.actions{display:flex;gap:6px;padding:8px 12px}
.act-btn{padding:5px 12px;border-radius:5px;border:none;cursor:pointer;font-size:0.8em;font-weight:500;color:#fff}

/* Modal */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:200;justify-content:center;align-items:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:10px;max-width:600px;width:92%;max-height:80vh;overflow-y:auto;padding:20px}
.modal h2{font-size:1em;margin-bottom:8px}
.modal .close{float:right;cursor:pointer;font-size:1.1em;color:#59636e;background:none;border:none;padding:4px}
.modal pre{background:#f6f8fa;border:1px solid #d1d9e0;border-radius:6px;padding:8px;font-size:0.78em;max-height:300px;overflow-y:auto;white-space:pre-wrap}
.modal .meta-row{display:flex;gap:8px;flex-wrap:wrap;font-size:0.8em;color:#59636e;margin:8px 0}
.modal .meta-row span{background:#f6f8fa;padding:1px 6px;border-radius:3px}
.modal textarea{width:100%;padding:8px;border:1px solid #d1d9e0;border-radius:4px;font-size:0.88em;font-family:inherit;resize:vertical}
.modal select{padding:5px 8px;border:1px solid #d1d9e0;border-radius:4px;font-size:0.85em}

/* Agent modal tabs */
.m-tab{padding:5px 12px;border:none;background:none;cursor:pointer;font-size:0.8em;font-weight:500;color:#59636e;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .1s}
.m-tab.active{color:#0550ae;border-bottom-color:#0550ae}
.m-tab:hover{color:#0550ae}
.m-tab-bar{display:flex;gap:0;border-bottom:1px solid #d1d9e0;margin:8px 0 10px}

/* Rich q-card for agent-to-agent questions */
.q-card-agent{padding:8px 10px;border-bottom:1px solid #f0f2f5;cursor:pointer;transition:background .1s}
.q-card-agent:hover{background:#f6f8fa}
.q-card-agent:last-child{border-bottom:none}
.q-card-agent .q-hdr{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:3px}
.q-card-agent .q-body{font-size:0.82em;color:#1f2328;line-height:1.4}
.q-card-agent .q-more{font-size:0.72em;color:#0550ae;margin-top:2px}

/* Worker bar */
.worker-bar{display:flex;gap:10px;align-items:center;padding:8px 12px;font-size:0.82em}
.w-st{font-weight:700}.w-st.running{color:#1a7f37}.w-st.idle{color:#0550ae}.w-st.stopped{color:#59636e}
.w-info{color:#59636e;font-size:0.78em}

/* Decisions mini */
.dec{padding:6px 10px;border-bottom:1px solid #f0f2f5;font-size:0.82em}
.dec:last-child{border-bottom:none}
.dec .d-topic{font-weight:500}

/* Channel tabs */
.ch-tabs{display:flex;gap:0;overflow-x:auto;flex-shrink:0;background:#085f56}
.ch-tab{padding:6px 12px;font-size:0.78em;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:rgba(255,255,255,.65);font-weight:500;transition:all .15s}
.ch-tab:hover{color:rgba(255,255,255,.9)}
.ch-tab.active{color:#fff;border-bottom-color:#25d366;font-weight:600}
.ch-tab .ch-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.ch-tab .ch-dot.running{background:#1a7f37;animation:blink-green 1.2s ease-in-out infinite}
.ch-tab .ch-dot.idle{background:#d1d9e0}
.ch-tab .ch-unread{background:#cf222e;color:#fff;border-radius:8px;padding:0 5px;font-size:0.8em;margin-left:4px}

/* Chat feed — message-focused */
.feed{overflow-y:auto;padding:0;min-height:0}
.conv-title{padding:6px 12px;font-size:0.75em;color:#59636e;background:#f6f8fa;border-bottom:1px solid #e8e8e8;font-weight:500;position:sticky;top:0;z-index:2}

/* Chat feed — WhatsApp-style */
.feed{background:#eae6df;padding:10px 14px !important}

/* Message bubble — shared */
.msg{max-width:72%;padding:5px 8px 3px;margin:2px 0;border-radius:7px;cursor:pointer;position:relative;word-break:break-word;box-shadow:0 1px 0.5px rgba(0,0,0,.13);display:block}

/* User messages — right side, light green, fit content width */
.msg.user-msg{background:#d9fdd3;margin-left:auto;border-top-right-radius:0;width:fit-content;max-width:65%}

/* Agent/assistant messages — left side, white */
.msg:not(.user-msg):not(.system-msg){background:#fff;margin-right:auto;border-top-left-radius:0}

/* System messages — center, pill */
.msg.system-msg{background:rgba(255,255,255,0.92);max-width:fit-content;margin:6px auto;text-align:center;border-radius:7px;padding:4px 12px;font-size:0.75em;color:#667781;box-shadow:0 1px 0.5px rgba(0,0,0,.1)}
.msg.system-msg .msg-hdr{display:none}
.msg.system-msg .msg-content{font-size:1em}

/* Header row */
.msg-hdr{display:flex;align-items:center;gap:4px;margin-bottom:1px}
.msg-avatar{display:none}
.msg-name{font-weight:600;font-size:0.8em}
.msg.user-msg .msg-name{display:none}
/* Color-code agent names */
.msg:not(.user-msg) .msg-name{color:#53bdeb}
.msg-time{font-size:0.65em;color:#667781;margin-left:auto;white-space:nowrap;align-self:flex-end}
.msg-status{font-size:0.58em;padding:1px 4px;border-radius:3px;font-weight:600}
.msg-status.pending{background:#fef3cd;color:#856404}
.msg-status.processing{background:#d1ecf1;color:#0c5460}
.msg-status.streaming{color:#1a7f37;background:none;animation:blink-green 1.2s ease-in-out infinite}
.msg-status.streaming::after{content:'typing...';font-style:italic}
.msg-status.complete{display:none}
.msg-status.answered{display:none}
.msg-status.error{background:#f8d7da;color:#721c24}

/* Time + status on same line at bottom-right (WhatsApp style) */
.msg-footer{display:flex;justify-content:flex-end;align-items:center;gap:4px;margin-top:1px}

/* Message content */
.msg-content{font-size:0.87em;line-height:1.45;color:#111b21;word-break:break-word}
.msg-content p:first-child{margin-top:0}
.msg-content p:last-child{margin-bottom:0}
.msg.collapsed .msg-content{max-height:140px;overflow:hidden;-webkit-mask-image:linear-gradient(180deg,#000 75%,transparent);mask-image:linear-gradient(180deg,#000 75%,transparent)}
.msg.streaming .msg-content{opacity:0.85}
.msg-expand{font-size:0.78em;color:#53bdeb;cursor:pointer;margin-top:3px;font-weight:500;user-select:none}
.msg-expand:hover{text-decoration:underline}

/* Rendered markdown in messages */
.msg-content h1,.msg-content h2,.msg-content h3{margin:6px 0 3px;font-size:1em;color:#111b21;font-weight:700}
.msg-content h1{font-size:1.05em}.msg-content h2{font-size:1em}.msg-content h3{font-size:0.95em}
.msg-content ul,.msg-content ol{margin:3px 0 3px 18px}
.msg-content li{margin:1px 0}
.msg-content code{background:rgba(0,0,0,.06);padding:1px 4px;border-radius:3px;font-size:0.88em;font-family:'SF Mono',Monaco,Consolas,monospace}
.msg-content pre{background:#111b21;color:#e9edef;padding:8px 10px;border-radius:6px;overflow-x:auto;margin:4px 0;font-size:0.84em}
.msg-content pre code{background:none;padding:0;color:inherit}
.msg-content p{margin:3px 0}
.msg-content blockquote{border-left:3px solid #d1d9e0;padding-left:8px;color:#667781;margin:3px 0}
.msg-content table{border-collapse:collapse;font-size:0.88em;margin:4px 0;width:100%}
.msg-content th,.msg-content td{border:1px solid #e2e8f0;padding:4px 8px;text-align:left}
.msg-content th{background:rgba(0,0,0,.04);font-weight:600}
.msg-content strong{font-weight:600}
.msg-content a{color:#027eb5}

/* Expanded logs — click bubble to see metadata */
.msg-logs{margin-top:6px;padding:6px 8px;background:rgba(0,0,0,.03);border-top:1px solid rgba(0,0,0,.06);font-size:0.72em;display:none}
.msg.expanded .msg-logs{display:block}
.msg-log-row{display:flex;gap:8px;padding:1px 0;color:#667781}
.msg-log-row .label{font-weight:600;min-width:60px;color:#111b21}
.msg-log-row a{color:#027eb5;text-decoration:none}

/* Question cards for owner */
.q-card{padding:10px;border-bottom:1px solid #f0f2f5}
.q-card:last-child{border-bottom:none}
.q-card .q-from{font-size:0.78em;font-weight:600;color:#0550ae}
.q-card .q-text{margin:3px 0;font-size:0.85em}
.q-card .q-actions{display:flex;gap:4px;margin-top:6px}
.q-card .q-actions button{padding:3px 10px;border-radius:4px;border:1px solid #d1d9e0;background:#fff;cursor:pointer;font-size:0.78em}
.q-card .q-actions button.approve{background:#1a7f37;color:#fff;border-color:#1a7f37}
.q-card .q-actions button.reject{background:#fff;color:#cf222e;border-color:#cf222e}
.q-card .q-answer-box{margin-top:6px;display:none}
.q-card .q-answer-box textarea{width:100%;padding:4px 6px;border:1px solid #d1d9e0;border-radius:4px;font-size:0.82em;font-family:inherit;resize:vertical;min-height:40px}
.q-card.answered{background:#f0fff4;opacity:0.8}
.q-card.for-me{border-left:3px solid #cf222e}

/* Workers list */
.wk{padding:6px 10px;border-bottom:1px solid #f0f2f5;font-size:0.82em;display:flex;align-items:center;gap:6px}
.wk:last-child{border-bottom:none}
.wk .wk-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.wk .wk-dot.running{background:#1a7f37}.wk .wk-dot.stopped{background:#59636e}.wk .wk-dot.idle{background:#0550ae}.wk .wk-dot.error{background:#cf222e}
@keyframes blink-green{0%,100%{box-shadow:0 0 0 0 rgba(26,127,55,.6)}50%{box-shadow:0 0 6px 2px rgba(26,127,55,.6)}}
.wk .wk-dot.running{animation:blink-green 1.2s ease-in-out infinite}
.agent .agent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.agent .agent-dot.running{background:#1a7f37;animation:blink-green 1.2s ease-in-out infinite}
.agent .agent-dot.idle{background:#d1d9e0}
.wk .wk-info{flex:1;min-width:0}
.wk .wk-name{font-weight:600;font-size:0.88em}
.wk .wk-meta{font-size:0.75em;color:#59636e}

/* Agent modal sessions */
.modal-sessions{margin-top:12px}
.modal-sessions h3{font-size:0.85em;color:#59636e;margin-bottom:6px}
.sess-item{padding:4px 8px;background:#f6f8fa;border-radius:4px;margin:3px 0;font-size:0.78em;display:flex;justify-content:space-between}
.sess-item .s-status{font-weight:600}
.sess-item .s-status.active{color:#1a7f37}.sess-item .s-status.closed{color:#59636e}

/* Data panel tabs */
.dp-tab{padding:6px 10px;font-size:0.78em;cursor:pointer;color:rgba(255,255,255,.6);font-weight:500;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.dp-tab:hover{color:rgba(255,255,255,.85)}
.dp-tab.active{color:#fff;border-bottom-color:#25d366;font-weight:600}
.dp-panel{display:none;min-height:0}
.dp-panel.active{display:flex;flex-direction:column;min-height:0;overflow:hidden}
.dp-panel>#tasks,.dp-panel>#findings-list,.dp-panel>#q-others{overflow-y:auto;flex:1;min-height:0}
/* Browse items */
.browse-item{padding:6px 10px;border-bottom:1px solid #f0f2f5;cursor:pointer;font-size:0.82em;transition:background .1s}
.browse-item:hover{background:#f6f8fa}
.browse-item .bi-id{font-family:monospace;font-size:0.85em;color:#0550ae}
.browse-item .bi-fields{color:#667781;font-size:0.9em;margin-top:2px}
.browse-detail{padding:8px;background:#f6f8fa;border:1px solid #e8e8e8;margin:0 6px 6px;border-radius:4px;font-size:0.78em;white-space:pre-wrap;font-family:monospace;max-height:300px;overflow-y:auto}
/* Findings list */
.finding-item{padding:8px 10px;border-bottom:1px solid #f0f2f5;cursor:pointer;transition:background .1s}
.finding-item:hover{background:#f6f8fa}
.finding-item .f-sev{font-size:0.68em;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:0.3px}
.finding-item .f-sev.critical{background:#cf222e;color:#fff}
.finding-item .f-sev.high{background:#ffebe9;color:#cf222e}
.finding-item .f-sev.medium{background:#fff8c5;color:#9a6700}
.finding-item .f-sev.low{background:#f0f2f5;color:#667781}
.finding-item code{background:#f0f2f5;padding:1px 4px;border-radius:3px;font-size:0.9em}

/* Activity bar */
.activity-bar{background:#064e45;display:flex;gap:0;overflow-x:auto;flex-shrink:0;padding:0 8px;border-bottom:1px solid rgba(255,255,255,.1)}
.ab-agent{display:flex;align-items:center;gap:5px;padding:5px 10px;font-size:0.76em;color:rgba(255,255,255,.5);white-space:nowrap;border-right:1px solid rgba(255,255,255,.08);flex-shrink:0}
.ab-agent:last-child{border-right:none}
.ab-agent.working{color:#25d366;font-weight:600}
.ab-agent.working .ab-dot{background:#25d366;animation:blink-green 1.2s ease-in-out infinite}
.ab-agent.idle .ab-dot{background:rgba(255,255,255,.25)}
.ab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ab-task{max-width:180px;overflow:hidden;text-overflow:ellipsis;font-size:0.92em;opacity:0.8}
.ab-agent.working .ab-task{opacity:1}

/* Agent terminal modal */
.term-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;justify-content:center;align-items:center}
.term-bg.open{display:flex}
.term-box{background:#1e1e1e;border-radius:8px;width:700px;max-width:90vw;height:500px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.term-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#323232;border-radius:8px 8px 0 0;flex-shrink:0}
.term-hdr .term-dot{width:10px;height:10px;border-radius:50%}
.term-hdr .term-title{color:#ccc;font-size:0.85em;flex:1;font-family:monospace}
.term-hdr .term-close{background:none;border:none;color:#888;font-size:1.2em;cursor:pointer;padding:0 4px}
.term-hdr .term-close:hover{color:#fff}
.term-body{flex:1;overflow-y:auto;padding:10px 14px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:0.78em;line-height:1.6;color:#d4d4d4}
.term-body .t-tool{color:#569cd6}
.term-body .t-result{color:#6a9955}
.term-body .t-text{color:#ce9178}
.term-body .t-info{color:#808080}
.term-body .t-done{color:#4ec9b0}
.term-body .t-err{color:#f44747}

/* Voice controls */
.mic-active{background:#cf222e !important;animation:pulse-red 1s ease-in-out infinite}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(207,34,46,.4)}50%{box-shadow:0 0 8px 4px rgba(207,34,46,.4)}}
.tts-active{background:#1a7f37 !important}
#voice-status{display:none;padding:2px 8px;font-size:0.7em;color:#9a6700;background:#fff8c5;border-radius:4px}
#voice-status.active{display:inline-block}
</style>
</head>
<body>

<header>
  <h1>AI Company</h1>
  <div class="hdr-status">
    <button id="btn-start" onclick="aicStart()" style="background:#25d366;color:#fff;border:none;padding:4px 14px;border-radius:4px;font-size:0.82em;font-weight:600;cursor:pointer">Start</button>
    <button id="btn-stop" onclick="aicStop()" style="background:#cf222e;color:#fff;border:none;padding:4px 14px;border-radius:4px;font-size:0.82em;font-weight:600;cursor:pointer;display:none">Stop</button>
    <button id="btn-clear" onclick="aicClear()" style="background:transparent;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.3);padding:4px 10px;border-radius:4px;font-size:0.78em;cursor:pointer" title="Clear all messages">Clear</button>
    <span id="ws-status"><span class="dot load"></span>connecting</span>
    <span id="class-count"></span>
  </div>
</header>
<div class="activity-bar" id="activity-bar"></div>

<div class="layout">

<!-- LEFT: Team sidebar -->
<div class="col" style="overflow-y:auto;gap:6px">
  <div class="card" style="flex-shrink:0">
    <div class="card-hdr" style="background:#075e54;color:#fff;border-bottom:none">Team <span class="count" id="agent-count" style="background:rgba(255,255,255,.2);color:#fff">0</span></div>
    <div class="card-body" id="agents" style="padding:0"></div>
  </div>
  <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0">
    <div class="card-hdr" style="font-size:0.78em;color:#667781;flex-shrink:0">Workers <span class="count" id="worker-count">0</span> <label style="font-weight:400;font-size:0.85em;margin-left:auto;cursor:pointer"><input type="checkbox" id="wk-only-active" onchange="load()" style="margin-right:3px">active only</label></div>
    <div class="card-body" id="workers-list" style="padding:0;overflow-y:auto;flex:1"></div>
  </div>
</div>

<!-- CENTER: Activity feed + Tasks -->
<div class="col">
  <div class="card" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div class="card-hdr" style="flex-shrink:0;padding:0">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:0 10px 0 0">
        <div class="ch-tabs" id="ch-tabs">
          <div class="ch-tab active" data-channel="general" onclick="switchChannel('general')">#general</div>
        </div>
        <div class="worker-bar" style="flex-shrink:0">
          <span class="w-st stopped" id="w-st">STOPPED</span>
          <span class="w-info" id="w-info"></span>
        </div>
      </div>
    </div>
    <div class="feed" id="feed" style="flex:1;overflow-y:auto;position:relative"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/elementStore/admin/dist/element-store.js"></script>
<script src="/elementStore/admin/ws-client.js"></script>
<script>
(function(){
  var API = location.origin + '/elementStore';
  window.API = API;
  var WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/elementStore/ws';
  store.storage.data.url = API;

  var esws = new ElementStoreWS(store, WS_URL);

  // Override _onChanges — emit raw items without store.applyRemote
  esws._onChanges = function(items) {
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      if (!item) continue;
      if (item._deleted) {
        this._emit('delete', item);
      } else {
        this._emit('change', item);
      }
    }
  };

  // Override _onMessage to handle 'initial' event (fetch-on-subscribe)
  var origOnMessage = esws._onMessage.bind(esws);
  esws._onMessage = function(msg) {
    if (msg.event === 'initial' && msg.items) {
      console.log('[WS] initial:', msg.class_id, msg.items.length, 'items');
      // Store items — only messages trigger feed render
      for (var i = 0; i < msg.items.length; i++) {
        var item = msg.items[i];
        if (item && item.id) {
          feedItems[item.id] = item;
        }
      }
      feedDirty = true;
      renderFeed();
      return;
    }
    origOnMessage(msg);
  };
  function bg(t,c){return '<span class="badge b-'+c+'">'+t+'</span>'}

  // ─── Render ──────────────────────────────────────────────
  async function load(){
    try {
      var agents = await fetch(API+'/store/ai:agent').then(r=>r.json());
      var assistants = []; try{assistants=await fetch(API+'/store/ai:assistant').then(r=>r.ok?r.json():[]);}catch(e){}
      // Merge assistants into agents list (they extend ai:agent)
      assistants.forEach(function(a){ if(!agents.find(function(ag){return ag.id===a.id})) agents.push(a); });
      var tasks = await fetch(API+'/store/ai:task').then(r=>r.json());
      var questions = await fetch(API+'/store/ai:question').then(r=>r.json());
      var decisions = await fetch(API+'/store/ai:decision').then(r=>r.json());
      var workers = []; try{workers=await fetch(API+'/store/ai:worker').then(r=>r.ok?r.json():[]);}catch(e){}
      var sessions = []; try{sessions=await fetch(API+'/store/ai:agent_session').then(r=>r.ok?r.json():[]);}catch(e){}
      window._sessions = sessions;
      window._tasks = tasks;

      // Build agent → last open task map
      var agentLastTask = {};
      tasks.forEach(function(t) {
        if(t.agent_id && t.status !== 'done' && t.status !== 'completed') {
          var existing = agentLastTask[t.agent_id];
          // prefer in_progress over open; then by step
          var tPriority = t.status === 'in_progress' ? 1 : 0;
          var ePriority = existing ? (existing.status === 'in_progress' ? 1 : 0) : -1;
          if(!existing || tPriority > ePriority) agentLastTask[t.agent_id] = t;
        }
      });
      window._agentLastTask = agentLastTask;

      // Workers list — show daemon + all agents as workers
      var activeWorker = workers[0] || null;
      var runningAgentIds = {};
      // Check all workers for running agents (AIC daemon + ASI workers)
      workers.forEach(function(w) {
        if((w.status === 'running' || w.status === 'listening') && w.current_agent) {
          runningAgentIds[w.current_agent] = true;
        }
      });
      if(activeWorker && activeWorker.status === 'running' && activeWorker.current_agent) {
        runningAgentIds[activeWorker.current_agent] = true;
      }
      // Check log for recently spawned agents (parallel execution)
      if(activeWorker && activeWorker.log) {
        var logStr = activeWorker.log.join('\n');
        var spawnMatches = logStr.match(/Spawning .+?\(([^)]+)\)/g) || [];
        var completeMatch = logStr.match(/All agents completed/);
        // If there's no "All agents completed" after spawns, agents are still running
        if(spawnMatches.length > 0) {
          var lastSpawnIdx = logStr.lastIndexOf('Spawning');
          var lastCompleteIdx = logStr.lastIndexOf('All agents completed');
          if(lastSpawnIdx > lastCompleteIdx) {
            // Agents still running — mark all spawned ones
            spawnMatches.forEach(function(m) {
              var id = m.match(/\(([^)]+)\)/);
              if(id) runningAgentIds[id[1]] = true;
            });
          }
        }
      }
      window._runningAgentIds = runningAgentIds;

      // Daemon row
      var wkh = '';
      if(activeWorker) {
        var dst = activeWorker.status || 'stopped';
        wkh += '<div class="wk"><span class="wk-dot '+(dst==='idle'||dst==='running'?'running':'stopped')+'"></span><div class="wk-info">';
        wkh += '<div class="wk-name">Daemon</div>';
        var dp = [dst.toUpperCase()];
        if(activeWorker.rounds_completed) dp.push('R:'+activeWorker.rounds_completed);
        if(activeWorker.last_heartbeat) dp.push(activeWorker.last_heartbeat.substring(11,19));
        wkh += '<div class="wk-meta">'+dp.join(' &middot; ')+'</div>';
        wkh += '</div></div>';
      }
      // Agent rows as workers — click to switch channel
      var wkOnlyActive = document.getElementById('wk-only-active').checked;
      var wkVisibleCount = 0;
      agents.forEach(function(a) {
        var isRunning = !!runningAgentIds[a.id];
        var agSt = isRunning ? 'running' : (a.last_run ? 'idle' : 'stopped');
        if(wkOnlyActive && !isRunning) return;
        wkVisibleCount++;
        var isSel = activeChannel === a.id;
        wkh += '<div class="wk" style="cursor:pointer;'+(isSel?'background:#f0f4ff;border-left:2px solid #0550ae;':'')+'" onclick="switchChannel(\''+a.id+'\')">';
        wkh += '<span class="wk-dot '+agSt+'"></span><div class="wk-info">';
        wkh += '<div class="wk-name">'+a.name+'</div>';
        var ap = [isRunning ? 'RUNNING' : 'IDLE'];
        if(a.run_count) ap.push(a.run_count+' runs');
        if(a.last_run) ap.push(a.last_run.substring(11,19));
        var wkTask = agentLastTask[a.id];
        if(wkTask) ap.push('Task: '+(wkTask.name||'?').substring(0,22)+(wkTask.name&&wkTask.name.length>22?'…':''));
        wkh += '<div class="wk-meta">'+ap.join(' &middot; ')+'</div>';
        wkh += '</div></div>';
      });
      document.getElementById('worker-count').textContent = wkVisibleCount;
      document.getElementById('workers-list').innerHTML = wkh || '<div style="padding:8px;color:#59636e;font-size:0.82em">No workers</div>';

      window._agents = agents;
      agents.sort(function(a,b){return (a.execution_order||99)-(b.execution_order||99)});
      updateActivityBar();

      // Worker bar update
      if(activeWorker){
        var wst=document.getElementById('w-st');
        var winfo=document.getElementById('w-info');
        var st=activeWorker.status||'stopped';
        var runCount = Object.keys(runningAgentIds).length;
        wst.textContent=st.toUpperCase()+(runCount?' — '+runCount+' agents running':'');
        wst.className='w-st '+(runCount?'running':st);
        var wp=[];
        if(activeWorker.rounds_completed)wp.push('R:'+activeWorker.rounds_completed);
        if(activeWorker.last_heartbeat)wp.push(activeWorker.last_heartbeat.substring(11,19));
        winfo.textContent=wp.join(' | ');
      }

      // Agents
      var agOnlyActive = document.getElementById('ag-only-active').checked;
      var agVisibleCount = 0;
      var ah='';
      agents.forEach(function(a,i){
        var isAct=!!runningAgentIds[a.id];
        if(agOnlyActive && !isAct) return;
        agVisibleCount++;
        ah+='<div class="agent'+(isAct?' active':'')+'" onclick="switchChannel(\''+a.id+'\')" ondblclick="showAgent('+i+')">';
        ah+='<span class="agent-dot '+(isAct?'running':'idle')+'"></span>';
        ah+='<div class="ord">'+(a.execution_order||'?')+'</div>';
        ah+='<div class="info"><div class="name">'+a.name+'</div>';
        ah+='<div class="meta">'+(a.title||'')+(a.run_count?' &middot; '+a.run_count+' runs':'')+'</div>';
        var agTask = agentLastTask[a.id];
        if(agTask) ah+='<div class="prompt-len" style="color:'+(agTask.status==='in_progress'?'#9a6700':'#59636e')+'">'+agTask.name.substring(0,28)+(agTask.name.length>28?'…':'')+'</div>';
        ah+='</div></div>';
      });
      document.getElementById('agent-count').textContent=agVisibleCount+'/'+agents.length;
      document.getElementById('agents').innerHTML=ah||'<div style="padding:12px;color:#59636e">'+(agOnlyActive?'No active agents':'No agents')+'</div>';

      // Tasks
      var openT=tasks.filter(function(t){return t.status!=='done'});
      openT.sort(function(a,b){return (a.step||99)-(b.step||99)});
      document.getElementById('task-count').textContent=openT.length;
      var th='';
      openT.forEach(function(t){
        var pc=(t.priority||'').toLowerCase();
        var stCls = t.status === 'open' ? 'open' : (t.status === 'done' || t.status === 'verified' ? 'done' : 'progress');
        th+='<div class="task" onclick="browseDetail(\'ai:task\',\''+t.id+'\')" style="cursor:pointer">';
        th+='<div class="t-name">'+bg(t.priority||'?',pc)+' '+bg(t.status||'?',stCls)+' '+esc(t.name)+'</div>';
        th+='<div class="t-meta">';
        if(t.agent_id)th+='<span>'+esc(agentName(t.agent_id))+'</span>';
        if(t.step)th+='<span>step:'+t.step+'</span>';
        th+='</div></div>';
      });
      document.getElementById('tasks').innerHTML=th||'<div style="padding:12px;color:#59636e">No open tasks</div>';

      // Findings count
      fetch(API+'/store/es:finding').then(function(r){return r.json()}).then(function(f){
        document.getElementById('finding-count').textContent=f.length;
      }).catch(function(){});

      // Questions — split into "for me" (owner/all) and "others"
      window._questions = questions;
      var qOpen = questions.filter(function(q){return q.status==='open'});
      var qForMe = qOpen.filter(function(q){
        return q.to_title==='owner' || q.to_title==='all' || !q.to_agents || q.to_agents.length===0;
      });
      var qForAgents = qOpen.filter(function(q){
        return q.to_agents && q.to_agents.length > 0 && q.to_title!=='owner' && q.to_title!=='all';
      });

      qOpen.sort(function(a,b){return (b.created||'').localeCompare(a.created||'')});
      qForMe.sort(function(a,b){return (a.created||'').localeCompare(b.created||'')});

      document.getElementById('q-count').textContent = qOpen.length;
      document.getElementById('q-mine-count').textContent = qForMe.length + ' for you';
      document.getElementById('q-mine-count').style.display = qForMe.length ? '' : 'none';

      // Cards for questions to owner
      var mh = '';
      qForMe.forEach(function(q) {
        mh += '<div class="q-card for-me" id="qc-'+q.id+'">';
        mh += '<div class="q-from">'+agentName(q.from_agent)+' asks you:</div>';
        mh += '<div class="q-text">'+esc(q.question)+'</div>';
        mh += '<div class="q-actions">';
        mh += '<button class="approve" onclick="answerQ(\''+q.id+'\',\'approved\')">Approve</button>';
        mh += '<button class="reject" onclick="answerQ(\''+q.id+'\',\'rejected\')">Reject</button>';
        mh += '<button onclick="toggleAnswerBox(\''+q.id+'\')">Reply...</button>';
        mh += '</div>';
        mh += '<div class="q-answer-box" id="qa-'+q.id+'"><textarea placeholder="Type your answer..." id="qat-'+q.id+'"></textarea>';
        mh += '<button class="act-btn" style="background:#0550ae;margin-top:4px" onclick="answerQ(\''+q.id+'\',document.getElementById(\'qat-'+q.id+'\').value)">Send</button></div>';
        mh += '</div>';
      });
      document.getElementById('q-mine').innerHTML = mh;

      // Compact list for agent-to-agent questions — rich cards
      var oh = '';
      qForAgents.forEach(function(q) {
        var to = q.to_agents ? q.to_agents.map(agentName).join(', ') : '?';
        var stCls = q.status==='open'?'open':(q.status==='answered'?'done':'p3');
        var fullText = q.question || '';
        var shortText = fullText.length > 90 ? fullText.substring(0, 90) + '…' : fullText;
        var isLong = fullText.length > 90;
        oh += '<div class="q-card-agent" onclick="toggleQCardAgent(\''+q.id+'\')">';
        oh += '<div class="q-hdr">';
        oh += '<span style="font-size:0.78em;font-weight:600;color:#0550ae">'+esc(agentName(q.from_agent))+' → '+esc(to)+'</span>';
        if(q.project) oh += '<span class="badge b-p3">'+esc(q.project)+'</span>';
        if(q.priority) oh += '<span class="badge b-'+((q.priority||'').toLowerCase())+'">'+esc(q.priority)+'</span>';
        oh += '<span class="badge b-'+stCls+'">'+esc(q.status||'open')+'</span>';
        oh += '</div>';
        oh += '<div class="q-body" id="qt-'+q.id+'">'+esc(shortText)+'</div>';
        if(isLong) oh += '<div class="q-more" id="qt-more-'+q.id+'">show more</div>';
        oh += '</div>';
      });
      document.getElementById('q-others').innerHTML = oh || '<div style="padding:8px;color:#59636e;font-size:0.82em">No agent-to-agent questions</div>';

      // Full table (expandable)
      var allQ = questions.slice().sort(function(a,b){
        // owner first, then open, then by date
        var aMe = (a.to_title==='owner'||a.to_title==='all')?0:1;
        var bMe = (b.to_title==='owner'||b.to_title==='all')?0:1;
        if(aMe!==bMe) return aMe-bMe;
        var aOpen = a.status==='open'?0:1;
        var bOpen = b.status==='open'?0:1;
        if(aOpen!==bOpen) return aOpen-bOpen;
        return (b.created||'').localeCompare(a.created||'');
      });
      var th = '';
      allQ.forEach(function(q) {
        var to = q.to_agents?q.to_agents.map(agentName).join(','):(q.to_title||'all');
        var stCls = q.status==='open'?'open':(q.status==='answered'?'done':'p3');
        th += '<tr'+(q.to_title==='owner'||q.to_title==='all'?' style="font-weight:500"':'')+'>';
        th += '<td>'+agentName(q.from_agent)+'</td>';
        th += '<td>'+to+'</td>';
        th += '<td>'+esc(str(q.question,60))+'</td>';
        th += '<td>'+bg(q.status||'open',stCls)+'</td>';
        th += '<td><a href="'+objLink('ai:question',q.id)+'" target="_blank" style="color:#0550ae;text-decoration:none">&#x2197;</a></td>';
        th += '</tr>';
      });
      document.getElementById('q-all-body').innerHTML = th;

      // Decisions
      document.getElementById('dec-count').textContent=decisions.length;
      var dh='';
      decisions.slice(-8).reverse().forEach(function(d){
        dh+='<div class="dec"><div class="d-topic">'+bg(d.priority||'?',(d.priority||'').toLowerCase())+' '+(d.topic||d.name||'?').substring(0,50)+'</div></div>';
      });
      document.getElementById('decisions').innerHTML=dh||'<div style="padding:8px;color:#59636e">None</div>';

      // Render channel tabs
      renderChannelTabs();

      // Map existing conversations to channels
      var allConvs = [];
      try { allConvs = await fetch(API+'/query/ai:conversation?status=active&_limit=50').then(function(r){return r.json()}); } catch(e){}
      allConvs.forEach(function(c) {

  // ─── Channels ──────────────────────────────────────────
  var activeChannel = 'general'; // 'general' or agent_id like 'agent:ceo'
  var channelConversations = {}; // agent_id → conversation_id
  var channelMessages = {}; // conversation_id → [messages]
  var channelUnread = {}; // agent_id → count

  window.switchChannel = function(ch) {
    activeChannel = ch;

    document.querySelectorAll('.ch-tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.channel === ch);

  function renderChannelTabs() {
    var tabs = document.getElementById('ch-tabs');

  // Get or create conversation for an agent channel
  async function getChannelConversation(agentId) {
    if(channelConversations[agentId]) return channelConversations[agentId];
    // Find existing active conversation for this agent
    try {
      var convs = await fetch(API+'/query/ai:conversation?agent_id='+encodeURIComponent(agentId)+'&status=active&_sort=updated_at&_order=desc&_limit=1').then(function(r){return r.json()});
      if(convs.length > 0) {
        channelConversations[agentId] = convs[0].id;
        return convs[0].id;
      }
    } catch(e) {}
    // Create new conversation
    try {
      var resp = await fetch(API+'/store/ai:conversation', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({class_id:'ai:conversation', agent_id:agentId, user_id:'owner', title:agentName(agentId)+' Channel', status:'active', created:new Date().toISOString()})
      });
      var created = await resp.json();
      if(created.id) {
        channelConversations[agentId] = created.id;
        return created.id;
      }
    } catch(e) {}
    return null;
  }

  // ─── Activity Feed — data-driven, sorted by date ────────
  var feedEl=document.getElementById('feed');
  var MAX_FEED=200;
  var feedItems={}; // id → item data
  var feedDirty=false;
  var feedRenderTimer=null;

  // Resolve agent name from ID (cached from last load)
  function agentName(id) {
    if (!id) return '?';
    if (id === 'owner') return 'You';
    var a = (window._agents||[]).find(function(x){return x.id===id});
    return a ? a.name : id.replace('agent:','');
  }

  // Link to admin — opens object in edit mode
  function objLink(classId, id) {
    return '/elementStore/admin/?class='+encodeURIComponent(classId)+'&id='+encodeURIComponent(id)+'&action=edit';
  }

  // Send message from feed input
  window.sendFeedMessage = async function() {
    var input = document.getElementById('feed-input');
    var text = input.value.trim();
    if(!text) return;
    input.value = '';
    input.disabled = true;

    try {
      var targetAgent = activeChannel === 'general' ? 'agent:assistant' : activeChannel;
      var convId = null;
      if(activeChannel !== 'general') {
        convId = await getChannelConversation(activeChannel);
      }
      var now = new Date().toISOString();
      // Smart routing: team commands go to coordinator, questions go to assistant
      var isTeamCommand = /\b(fix|build|implement|refactor|scan|audit|work on|start|create|deploy|update|improve|upgrade)\b/i.test(text);

      var msgBody = {class_id:'ai:message', user_id:'owner', role:'user', content:text, status:'pending', created:now};
      if(activeChannel === 'general') {
        if(isTeamCommand) {
          // Work commands → both coordinator AND assistant (coordinator acts, assistant confirms)
          msgBody.to_agents = ['agent:coordinator', 'agent:assistant'];
        } else {
          msgBody.to_agents = ['agent:assistant'];
        }
      } else {
        msgBody.to_agents = [targetAgent];
        msgBody.agent_id = targetAgent;
        if(convId) msgBody.conversation_id = convId;
      }

      // Optimistic: show immediately with temp ID
      var tempId = '_sending_' + Date.now();
      var optimistic = Object.assign({id: tempId}, msgBody);
      feedUpsert(optimistic);

      var resp = await fetch(API+'/store/ai:message', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(msgBody)
      });
      var created = await resp.json();

      // Replace temp with real
      delete feedItems[tempId];
      var tempEl = document.getElementById('fi-' + tempId);
      if(tempEl) tempEl.remove();
      if(created.id) {
        feedUpsert(Object.assign({}, msgBody, created));
      }

      // Scroll to bottom
      feedEl.scrollTop = feedEl.scrollHeight;
    } catch(e) {
      console.error('[FEED] send error:', e);
    }
    input.disabled = false;
    input.focus();
  };

  // Add/update item in feed data store
  function feedUpsert(item) {
    if(!item || !item.id) return;
    feedItems[item.id] = item;
    feedDirty = true;
    if(!feedRenderTimer) {
      feedRenderTimer = setTimeout(function() {
        feedRenderTimer = null;
        if(feedDirty) { feedDirty = false; renderFeed(); }
      }, 100); // batch renders within 100ms
    }
  }

  function feedRemove(id) {
    delete feedItems[id];
    feedDirty = true;
  }

  // Render the full feed sorted by date — newest at BOTTOM (chat style)
  var wasAtBottom = true;
  var unreadCount = 0;

  function renderFeed() {
    wasAtBottom = (feedEl.scrollTop + feedEl.clientHeight >= feedEl.scrollHeight - 30);

    var items = Object.values(feedItems);

    // Messages only — the feed is a group chat
    var messages = items.filter(function(item) {
      if(item.class_id !== 'ai:message') return false;
      // Hide system health/status messages
      if(item.role === 'system' && item.metadata && item.metadata.type === 'health') return false;
      if(item.id === '_ws_status') return true;
      // Hide empty/processing messages
      if(item.role === 'assistant' && !item.content && item.status === 'streaming') return false;
      // Hide system finding/task notifications (shown in Findings/Tasks tabs instead)
      if(item.role === 'user' && item.user_id === 'system' && item.content && (item.content.indexOf('New finding reported') === 0 || item.content.indexOf('New task assigned') === 0 || item.content.indexOf('Task ready for review') === 0 || item.content.indexOf('Task verified') === 0 || item.content.indexOf('Task needs rework') === 0)) return false;
      // Hide agent-to-agent system routing messages
      if(item.user_id === 'system' && item.role === 'user' && item.content && item.content.indexOf('Agent agent:') === 0) return false;
      return true;
    });

    // Filter by active channel
    if(activeChannel !== 'general') {
      messages = messages.filter(function(item) {
        return item.agent_id === activeChannel ||
          (item.to_agents && item.to_agents.indexOf(activeChannel) >= 0) ||
          (item.conversation_id && channelConversations[activeChannel] === item.conversation_id);
      });
    }

    // Sort oldest → newest (chat style)
    messages.sort(function(a,b) {
      var da = a.created || a.created_at || a.updated_at || '';
      var db = b.created || b.created_at || b.updated_at || '';
      return da.localeCompare(db);
    });
    if(messages.length > MAX_FEED) messages = messages.slice(-MAX_FEED);

    // Incremental DOM update — only touch messages that changed or are new
    var existingIds = {};
    var existingEls = feedEl.querySelectorAll('.msg[id]');
    for(var e = 0; e < existingEls.length; e++) {
      existingIds[existingEls[e].id] = existingEls[e];
    }

    var hasContent = false;
    for(var i = 0; i < messages.length; i++) {
      var m = messages[i];
      var elId = 'fi-' + m.id;
      hasContent = true;

      var existing = existingIds[elId];
      if(existing) {
        // Update in place — only if content or status changed
        var oldContent = existing.getAttribute('data-hash') || '';
        var newHash = (m.status||'') + ':' + (m.content||'').length;
        if(oldContent !== newHash) {
          var tmp = document.createElement('div');
          tmp.innerHTML = messageCard(m);
          var newEl = tmp.firstChild;
          existing.replaceWith(newEl);
        }
        delete existingIds[elId]; // mark as still present
      } else {
        // New message — append
        var tmp = document.createElement('div');
        tmp.innerHTML = messageCard(m);
        feedEl.appendChild(tmp.firstChild);
      }
    }

    // Remove messages that no longer match filter (rare)
    Object.values(existingIds).forEach(function(el) { el.remove(); });

    if(!hasContent && !feedEl.querySelector('.msg')) {
      feedEl.innerHTML = '<div style="padding:30px 12px;color:#8b949e;text-align:center;font-size:0.85em">No messages yet. Send one below.</div>';
    }

    // Add data-hash to all messages for change detection
    feedEl.querySelectorAll('.msg[id]').forEach(function(el) {
      var mid = el.id.replace('fi-','');
      var item = feedItems[mid];
      if(item) el.setAttribute('data-hash', (item.status||'') + ':' + (item.content||'').length);
    });

    if(wasAtBottom) {
      feedEl.scrollTop = feedEl.scrollHeight;
      unreadCount = 0;
      updateFfBtn();
    } else {
      unreadCount++;
      updateFfBtn();
    }
  }

  // Fast-forward button
  function updateFfBtn() {
    var btn = document.getElementById('feed-ff');
    if(!btn) return;
    if(unreadCount > 0 && !wasAtBottom) {
      btn.style.display = 'block';
      btn.textContent = '↓ ' + unreadCount + ' new';
    } else {
      btn.style.display = 'none';
    }
  }

  feedEl.addEventListener('scroll', function() {
    var atBottom = (feedEl.scrollTop + feedEl.clientHeight >= feedEl.scrollHeight - 30);
    if(atBottom) { unreadCount = 0; updateFfBtn(); }
  });

  // Message card — chat bubble with expandable logs
  function messageCard(item) {
    var role = item.role || '?';
    var status = item.status || '';
    var isUser = role === 'user';
    var isSystem = role === 'system';
    var isStreaming = status === 'streaming';
    var time = (item.created || item.created_at || item.updated_at || '').substring(11,19);
    var content = item.content || '';
    var collapsed = content.length > 300 && !isStreaming ? ' collapsed' : '';

    // Avatar
    var avatarCls = isUser ? 'user' : (isSystem ? 'system' : 'assistant');
    var avatarLetter = isUser ? 'U' : (isSystem ? 'S' : (agentName(item.agent_id)||'A').charAt(0));
    var name = isUser ? agentName(item.user_id || 'owner') : (isSystem ? 'system' : agentName(item.agent_id));

    // Status badge (only show non-final states)
    var stHtml = '';
    if(status && status !== 'complete' && status !== 'answered') {
      var stLabel = status === 'streaming' ? '' : status;
      stHtml = '<span class="msg-status '+status+'">'+stLabel+'</span>';
    }

    // Build logs section (hidden until expanded)
    var logs = '';
    if(!isSystem) {
      logs += '<div class="msg-logs">';
      logs += '<div class="msg-log-row"><span class="label">ID</span><span>'+item.id+'</span></div>';
      if(item.conversation_id) logs += '<div class="msg-log-row"><span class="label">Conv</span><span>'+item.conversation_id+'</span></div>';
      if(status) logs += '<div class="msg-log-row"><span class="label">Status</span><span>'+status+'</span></div>';
      if(item.metadata) {
        var md = item.metadata;
        if(md.provider_id) logs += '<div class="msg-log-row"><span class="label">Provider</span><span>'+md.provider_id+'</span></div>';
        if(md.model) logs += '<div class="msg-log-row"><span class="label">Model</span><span>'+md.model+'</span></div>';
        if(md.duration_s) logs += '<div class="msg-log-row"><span class="label">Duration</span><span>'+md.duration_s+'s</span></div>';
        if(md.input_tokens) logs += '<div class="msg-log-row"><span class="label">Tokens in</span><span>'+md.input_tokens+'</span></div>';
        if(md.output_tokens) logs += '<div class="msg-log-row"><span class="label">Tokens out</span><span>'+md.output_tokens+'</span></div>';
      }
      if(item.references && item.references.length) logs += '<div class="msg-log-row"><span class="label">Refs</span><span>'+item.references.join(', ')+'</span></div>';
      if(item.to_agents && item.to_agents.length) logs += '<div class="msg-log-row"><span class="label">To</span><span>'+item.to_agents.map(agentName).join(', ')+'</span></div>';
      logs += '<div class="msg-log-row"><a href="'+objLink('ai:message',item.id)+'" target="_blank">Open in admin ↗</a></div>';
      logs += '</div>';
    }

    var extraCls = isUser ? ' user-msg' : (isSystem ? ' system-msg' : '');
    if(isStreaming) extraCls += ' streaming';

    // Render content: markdown for assistant, plain for user/system
    var renderedContent = '';
    if(isUser || isSystem || !content) {
      // Plain text — convert \n to <br> for readability
      renderedContent = esc(content).replace(/\n/g, '<br>');
    } else {
      // Assistant messages — render as markdown
      try {
        // Ensure literal \n sequences are actual newlines for markdown parsing
        var mdContent = content.replace(/\\n/g, '\n');
        if(typeof marked !== 'undefined') {
          renderedContent = marked.parse(mdContent);
        } else {
          renderedContent = esc(mdContent).replace(/\n/g, '<br>');
        }
      } catch(e) {
        renderedContent = esc(content).replace(/\n/g, '<br>');
      }
    }

    return '<div class="msg'+collapsed+extraCls+'" id="fi-'+item.id+'" onclick="toggleMsg(this)">' +
      '<div class="msg-hdr">' +
        '<span class="msg-name">'+name+'</span>' +
        stHtml +
      '</div>' +
      '<div class="msg-content">'+renderedContent+'</div>' +
      (collapsed ? '<div class="msg-expand">show more</div>' : '') +
      '<div class="msg-footer"><span class="msg-time">'+time+'</span></div>' +
      logs +
    '</div>';
  }

  window.toggleMsg = function(el) {
    var exp = el.querySelector('.msg-expand');
    if(el.classList.contains('collapsed')) {
      // Expand — show full content
      el.classList.remove('collapsed');
      if(exp) exp.textContent = 'show less';
      el.classList.add('msg-full');
    } else if(el.classList.contains('msg-full')) {
      // Collapse back
      el.classList.remove('msg-full');
      el.classList.add('collapsed');
      if(exp) exp.textContent = 'show more';
    } else if(el.classList.contains('expanded')) {
      el.classList.remove('expanded');
    } else {
      el.classList.add('expanded');
    }
  };

  function esc(s){return s?String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
  function str(s,n){return s?(s.length>n?s.substring(0,n)+'...':s):''}

  // ─── Start / Stop / Clear ──────────────────────────────────
  window.aicStart = function() {
    var text = prompt('What should the team work on?', 'Scan the project, find bugs, and create a fix plan.');
    if (!text) return;
    fetch(API+'/store/ai:message', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        class_id:'ai:message',
        user_id:'owner',
        to_agents:['agent:assistant'],
        role:'user',
        content:text,
        status:'pending',
        created:new Date().toISOString()
      })
    }).then(function(){
      document.getElementById('btn-start').style.display='none';
      document.getElementById('btn-stop').style.display='inline-block';
    });
  };

  window.aicStop = function() {
    if(!confirm('Stop all running agents? (pending messages will be cancelled)')) return;
    // Mark all pending + streaming messages as answered to stop the chain
    Promise.all([
      fetch(API+'/query/ai:message?status=pending&_limit=50').then(function(r){return r.json()}),
      fetch(API+'/query/ai:message?status=streaming&_limit=50').then(function(r){return r.json()})
    ]).then(function(results) {
      var msgs = results[0].concat(results[1]);
      msgs.forEach(function(m){
        fetch(API+'/store/ai:message/'+m.id, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'answered'})});
      });
    });
    document.getElementById('btn-start').style.display='inline-block';
    document.getElementById('btn-stop').style.display='none';
  };

  window.aicClear = function() {
    if(!confirm('Clear all messages from the feed? (Tasks and findings are kept)')) return;
    fetch(API+'/store/ai:message').then(function(r){return r.json()}).then(function(msgs){
      var promises = msgs.map(function(m){
        return fetch(API+'/store/ai:message/'+m.id, {method:'DELETE'});
      });
      Promise.all(promises).then(function(){
        feedItems = {};
        feedDirty = true;
        renderFeed();
      });
    });
  };

  // Show stop button if agents are running
  setInterval(function() {
    var anyWorking = Object.values(agentActivity).some(function(a){return a.status==='streaming'||a.status==='processing'});
    document.getElementById('btn-start').style.display = anyWorking ? 'none' : 'inline-block';
    document.getElementById('btn-stop').style.display = anyWorking ? 'inline-block' : 'none';
  }, 3000);

  // ─── Activity Bar ─────────────────────────────────────────
  // Tracks what each agent is doing right now
  var agentActivity = {}; // agent_id → { status, task, since }

  function updateActivityBar() {
    var agents = window._agents || [];
    var bar = document.getElementById('activity-bar');
    if (!bar || !agents.length) return;
    var h = '';
    agents.forEach(function(a) {
      var act = agentActivity[a.id] || {};
      var isWorking = act.status === 'streaming' || act.status === 'processing';
      var cls = isWorking ? 'working' : 'idle';
      var task = '';
      if (isWorking && act.task) {
        task = act.task;
      } else if (isWorking) {
        task = 'thinking...';
      } else {
        task = 'idle';
      }
      h += '<div class="ab-agent ' + cls + '">';
      h += '<span class="ab-dot"></span>';
      h += '<strong>' + esc(a.name) + '</strong>';
      h += '<span class="ab-task">' + esc(task) + '</span>';
      h += '</div>';
    });
    bar.innerHTML = h;
  }

  // Called when we see a message status change
  function trackAgentActivity(item) {
    if (item.class_id !== 'ai:message' || !item.agent_id) return;
    var agentId = item.agent_id;

    if (item.role === 'assistant') {
      if (item.status === 'streaming' || item.status === 'processing') {
        // Agent is working — extract what they're working on
        var task = '';
        // Find the input message they're responding to
        if (item.references && item.references.length) {
          var refMsg = feedItems[item.references[0]];
          if (refMsg && refMsg.content) {
            task = refMsg.content.substring(0, 60);
          }
        }
        agentActivity[agentId] = { status: item.status, task: task || 'working...', since: Date.now() };
      } else if (item.status === 'complete' || item.status === 'error') {
        agentActivity[agentId] = { status: 'idle', task: '', since: Date.now() };
      }
      updateActivityBar();
    }

    // Also track from input messages being processed
    if (item.role === 'user' && item.status === 'processing' && item.to_agents) {
      item.to_agents.forEach(function(aid) {
        var taskPreview = (item.content || '').substring(0, 60);
        agentActivity[aid] = { status: 'processing', task: taskPreview, since: Date.now() };
      });
      updateActivityBar();
    }
  }

  // Auto-clear stale activity (agent stuck for > 5 min = probably done)
  setInterval(function() {
    var now = Date.now();
    Object.keys(agentActivity).forEach(function(aid) {
      var act = agentActivity[aid];
      if (act.status !== 'idle' && act.since && (now - act.since) > 300000) {
        agentActivity[aid] = { status: 'idle', task: '', since: now };
      }
    });
    updateActivityBar();
  }, 30000);

  // ─── Data Panel ──────────────────────────────────────────
  window.switchDataTab = function(tab) {
    document.querySelectorAll('.dp-tab').forEach(function(t){t.classList.remove('active')});
    document.querySelectorAll('.dp-panel').forEach(function(p){p.classList.remove('active');p.style.display='none'});
    var tabEl = document.querySelector('.dp-tab[data-tab="'+tab+'"]');
    var panelEl = document.getElementById('dp-'+tab);
    if(tabEl) tabEl.classList.add('active');
    if(panelEl) { panelEl.classList.add('active'); panelEl.style.display='flex'; }
    if(tab === 'browse') browseLoad();
    if(tab === 'findings') loadFindings();
    if(tab === 'tasks') loadTasks();
  };

  // Live task loading for the Tasks tab
  window.loadTasks = function() {
    fetch(API+'/store/ai:task').then(function(r){return r.json()}).then(function(items){
      var openT = items.filter(function(t){return t.status !== 'done' && t.status !== 'verified'});
      var doneT = items.filter(function(t){return t.status === 'done' || t.status === 'verified'});
      document.getElementById('task-count').textContent = openT.length;
      var el = document.getElementById('tasks');

      var h = '';
      // Open/in-progress tasks
      openT.sort(function(a,b){return (a.step||99)-(b.step||99)});
      openT.forEach(function(t){
        var pc=(t.priority||'').toLowerCase();
        var stCls = t.status==='open'?'open':(t.status==='in_progress'?'progress':'open');
        h+='<div class="task" onclick="browseDetail(\'ai:task\',\''+t.id+'\')" style="cursor:pointer">';
        h+='<div class="t-name">'+bg(t.priority||'?',pc)+' '+bg(t.status||'?',stCls)+' '+esc(t.name)+'</div>';
        h+='<div class="t-meta">';
        if(t.agent_id)h+='<span>'+esc(agentName(t.agent_id))+'</span>';
        if(t.step)h+='<span>step:'+t.step+'</span>';
        h+='</div></div>';
      });

      if(!openT.length) h += '<div style="padding:8px 10px;color:#667781;font-size:0.82em">No open tasks</div>';

      // Completed tasks section
      if(doneT.length) {
        h += '<div style="border-top:1px solid #e8e8e8;padding:6px 10px;font-size:0.75em;font-weight:600;color:#1a7f37;background:#f0fff4">Completed ('+doneT.length+')</div>';
        h += '<div id="done-tasks" style="opacity:0.7">';
        doneT.forEach(function(t){
          h+='<div class="task" onclick="browseDetail(\'ai:task\',\''+t.id+'\')" style="cursor:pointer">';
          h+='<div class="t-name">'+bg('done','done')+' '+esc(t.name)+'</div>';
          h+='<div class="t-meta">';
          if(t.agent_id)h+='<span>'+esc(agentName(t.agent_id))+'</span>';
          if(t.completed_at)h+='<span>'+t.completed_at.substring(11,19)+'</span>';
          h+='</div></div>';
        });
        h += '</div>';
      }

      el.innerHTML=h;
    }).catch(function(){});
  };

  // ─── Findings ────────────────────────────────────────────
  window.loadFindings = function() {
    fetch(API+'/store/es:finding').then(function(r){return r.json()}).then(function(items){
      document.getElementById('finding-count').textContent = items.length;
      var el = document.getElementById('findings-list');
      if(!items.length) { el.innerHTML='<div style="padding:20px;text-align:center;color:#667781;font-size:0.85em">No findings yet</div>'; return; }
      items.sort(function(a,b){
        var sev={critical:0,high:1,medium:2,low:3};
        return (sev[a.severity]||9)-(sev[b.severity]||9);
      });
      var h='';
      items.forEach(function(f, idx){
        var loc = '';
        if(f.location) {
          var locs = Array.isArray(f.location) ? f.location : [f.location];
          loc = locs.map(function(l){return '<code>'+esc(l)+'</code>'}).join(', ');
        }
        h+='<div class="finding-item" onclick="toggleFinding('+idx+')">';
        h+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
        h+='<span class="f-sev '+(f.severity||'medium')+'">'+(f.severity||'?')+'</span>';
        if(f.category) h+='<span style="font-size:0.7em;color:#667781;background:#f0f2f5;padding:1px 5px;border-radius:3px">'+esc(f.category)+'</span>';
        h+='<span style="font-size:0.7em;color:#667781">'+(f.status||'open')+'</span>';
        h+='</div>';
        h+='<div class="f-title" style="font-weight:600;font-size:0.88em;margin-top:3px">'+esc(f.name||'unnamed')+'</div>';

        // Expandable detail section
        h+='<div class="f-detail" id="finding-detail-'+idx+'" style="display:none;margin-top:6px;font-size:0.84em">';
        if(f.description && f.description !== f.name) {
          h+='<div style="margin-bottom:6px;color:#111b21;line-height:1.5">'+esc(f.description)+'</div>';
        }
        if(loc) {
          h+='<div style="margin-bottom:4px"><span style="font-weight:600;color:#667781;font-size:0.9em">Location:</span> '+loc+'</div>';
        }
        if(f.fix) {
          h+='<div style="background:#dafbe1;padding:6px 8px;border-radius:4px;margin-top:4px;font-size:0.92em">';
          h+='<span style="font-weight:600;color:#1a7f37">Fix:</span> '+esc(f.fix)+'</div>';
        }
        if(f.gitlab_issue) {
          h+='<div style="margin-top:4px"><a href="'+esc(f.gitlab_issue)+'" target="_blank" style="color:#027eb5;font-size:0.85em;text-decoration:none">GitLab Issue #'+(f.gitlab_iid||'')+'  ↗</a></div>';
        }
        if(f.reported_by) {
          h+='<div style="margin-top:4px;font-size:0.82em;color:#667781">Reported by: '+esc(f.reported_by)+'</div>';
        }
        h+='<div style="margin-top:4px;font-size:0.78em;color:#8b949e;font-family:monospace">'+esc(f.id)+'</div>';
        h+='</div>';

        h+='</div>';
      });
      el.innerHTML=h;
    }).catch(function(){});
  };

  window.toggleFinding = function(idx) {
    var el = document.getElementById('finding-detail-'+idx);
    if(el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
  };

  // ─── Data Browser ────────────────────────────────────────
  window.browseLoad = function() {
    var cls = document.getElementById('browse-class').value;
    var el = document.getElementById('browse-results');
    el.innerHTML='<div style="padding:20px;text-align:center;color:#667781">Loading...</div>';
    fetch(API+'/store/'+encodeURIComponent(cls)).then(function(r){return r.json()}).then(function(items){
      if(!items || !items.length) { el.innerHTML='<div style="padding:20px;text-align:center;color:#667781">No objects</div>'; return; }
      var h='';
      items.forEach(function(item){
        var preview = '';
        if(item.name) preview += '<strong>'+esc(item.name)+'</strong> ';
        if(item.status) preview += '<span class="badge b-'+item.status+'">'+item.status+'</span> ';
        if(item.priority) preview += '<span class="badge b-'+item.priority.toLowerCase()+'">'+item.priority+'</span> ';
        if(item.content) preview += esc(str(item.content,80));
        else if(item.description) preview += esc(str(item.description,80));
        else if(item.title) preview += esc(item.title);
        h+='<div class="browse-item" onclick="browseDetail(\''+cls+'\',\''+item.id+'\')">';
        h+='<div class="bi-id">'+esc(item.id)+'</div>';
        h+='<div class="bi-fields">'+preview+'</div>';
        h+='</div>';
      });
      el.innerHTML=h;
    }).catch(function(e){el.innerHTML='<div style="padding:20px;color:#cf222e">Error: '+e.message+'</div>';});
  };

  window.browseDetail = function(cls, id) {
    fetch(API+'/store/'+encodeURIComponent(cls)+'/'+encodeURIComponent(id)).then(function(r){return r.json()}).then(function(obj){
      // Show in a modal-like detail view
      var existing = document.querySelector('.browse-detail');
      if(existing) existing.remove();
      var detail = document.createElement('div');
      detail.className = 'browse-detail';
      detail.textContent = JSON.stringify(obj, null, 2);
      detail.onclick = function(){ detail.remove(); };
      var panel = document.getElementById('dp-browse');
      if(!panel || !panel.classList.contains('active')) {
        // If we're on findings/tasks tab, show inline
        panel = document.querySelector('.dp-panel.active');
      }
      if(panel) {
        var results = panel.querySelector('#browse-results, #findings-list, #tasks');
        if(results) results.parentNode.insertBefore(detail, results.nextSibling);
        else panel.appendChild(detail);
      }
    });
  };

  // ─── WebSocket ──────────────────────────────────────────
  esws.on('connected',function(msg){
    console.log('[WS] connected:', msg);

    // Subscribe with fetch — get last N objects on connect
    var feedClasses = {
      'ai:message': 30,
      'ai:task': 20,
      'ai:question': 15,
      'ai:decision': 10,
      'ai:worker': 5,
      'ai:conversation': 10,
      'ai:round': 5,
      'es:finding': 10,
    };
    var notifyOnly = ['ai:agent','ai:preference','ai:agent_session','ai:prompt'];

    // Subscribe with fetch for feed classes
    Object.keys(feedClasses).forEach(function(c){
      esws._send({action:'subscribe', class_id:c, fetch:feedClasses[c]});
    });
    // Subscribe notify-only for others
    notifyOnly.forEach(function(c){
      esws._send({action:'subscribe', class_id:c});
    });

    console.log('[WS] subscribed to', Object.keys(feedClasses).length + notifyOnly.length, 'classes (' + Object.keys(feedClasses).length + ' with fetch)');
    feedUpsert({id:'_ws_status', class_id:'ai:message', role:'system', content:'Connected — loading history...', updated_at:new Date().toISOString()});
  });

  var rt=null;
  function sched(){if(rt)clearTimeout(rt);rt=setTimeout(function(){rt=null;load()},500)}

  esws.on('change',function(item){
    if(!item||!item.id) return;
    // Only put messages into the chat feed
    if(item.class_id==='ai:message') feedUpsert(item);
    // Store non-message items for sidebar widgets (tasks, agents, etc.)
    if(item.class_id!=='ai:message') { feedItems[item.id] = item; }
    // Track agent activity for the activity bar
    trackAgentActivity(item);
    // Auto-refresh Tasks and Findings tabs on relevant changes
    if(item.class_id==='ai:task') loadTasks();
    if(item.class_id==='es:finding') loadFindings();
    // Worker changes → update running indicators immediately
    if(item.class_id==='ai:worker') {
      if(item.current_agent && item.status==='running') {
        window._runningAgentIds = window._runningAgentIds || {};
        window._runningAgentIds[item.current_agent] = true;
      }
    }
    // Track unread per agent channel
    if(item.class_id==='ai:message' && item.agent_id && item.agent_id !== 'agent:assistant') {
      var msgChannel = item.agent_id;
      if(msgChannel !== activeChannel) {
        channelUnread[msgChannel] = (channelUnread[msgChannel]||0) + 1;
        renderChannelTabs();
      }
    }
    // Auto-speak new assistant responses if TTS is enabled
    if(item.class_id==='ai:message' && item.role==='assistant' && item.status==='complete' && item.content && window._ttsEnabled) {
      if(activeChannel==='general' || item.agent_id===activeChannel) {
        speakResponse(item.content);
      }
    }
    sched();
  });
  esws.on('delete',function(item){
    if(!item||!item.id) return;
    feedRemove(item.id);
    feedDirty = true;
    renderFeed();
    sched();
  });
  esws.on('close',function(){
    document.getElementById('ws-status').innerHTML='<span class="dot err"></span>reconnecting';
    feedUpsert({id:'_ws_status', class_id:'ai:message', role:'system', content:'Disconnected — reconnecting...', updated_at:new Date().toISOString()});
  });
  try {
    console.log('[AIC] Connecting WS to:', WS_URL);
    esws.connect({user_id:'aic-dashboard'});
    console.log('[AIC] WS connect called');
  } catch(e) {
    console.error('[AIC] WS connect failed:', e);
  }

  load();
  loadTasks();
  loadFindings();
  setInterval(function(){if(!esws.ws||esws.ws.readyState!==1)load()},15000);
  // Refresh tasks and findings every 10 seconds regardless of WS
  setInterval(function(){ loadTasks(); loadFindings(); }, 10000);

  // ─── Voice Interface ─────────────────────────────────────
  var _speechRecognition = null;
  var _micActive = false;
  window._ttsEnabled = false;

  window.toggleMic = function() {
    if (_micActive) { stopMic(); } else { startMic(); }
  };

  function startMic() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Speech recognition requires Chrome or Edge.'); return; }

    _speechRecognition = new SR();
    _speechRecognition.continuous = false;
    _speechRecognition.interimResults = true;
    _speechRecognition.lang = 'en-US';

    _speechRecognition.onstart = function() {
      _micActive = true;
      document.getElementById('mic-btn').classList.add('mic-active');
      document.getElementById('feed-input').placeholder = 'Listening...';
    };

    _speechRecognition.onresult = function(event) {
      var transcript = '';
      for (var i = event.resultIndex; i < event.results.length; i++) {
        transcript += event.results[i][0].transcript;
      }
      document.getElementById('feed-input').value = transcript;
      // Auto-send on final result
      if (event.results[event.results.length - 1].isFinal) {
        setTimeout(function() {
          if (document.getElementById('feed-input').value.trim()) {
            sendFeedMessage();
          }
        }, 400);
      }
    };

    _speechRecognition.onerror = function(e) {
      console.warn('[Voice] error:', e.error);
      stopMic();
    };

    _speechRecognition.onend = function() { stopMic(); };
    _speechRecognition.start();
  }

  function stopMic() {
    _micActive = false;
    document.getElementById('mic-btn').classList.remove('mic-active');
    document.getElementById('feed-input').placeholder =
      activeChannel === 'general' ? 'Type a message...' : 'Message ' + agentName(activeChannel) + '...';
    if (_speechRecognition) {
      try { _speechRecognition.stop(); } catch(e) {}
      _speechRecognition = null;
    }
  }

  window.toggleTTS = function() {
    window._ttsEnabled = !window._ttsEnabled;
    document.getElementById('tts-btn').classList.toggle('tts-active', window._ttsEnabled);
  };

  window.speakResponse = function(text) {
    if (!window._ttsEnabled || !window.speechSynthesis) return;
    // Strip markdown for cleaner speech
    var clean = text
      .replace(/#{1,6}\s/g, '')
      .replace(/\*\*([^*]+)\*\*/g, '$1')
      .replace(/\*([^*]+)\*/g, '$1')
      .replace(/`[^`]+`/g, '')
      .replace(/```[\s\S]*?```/g, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/^\s*[-*]\s/gm, '')
      .replace(/---[\s\S]*$/m, '')  // strip summary block
      .replace(/\n+/g, '. ')
      .trim();
    if (clean.length > 600) {
      clean = clean.substring(0, 600) + '... end of response.';
    }
    var utter = new SpeechSynthesisUtterance(clean);
    utter.rate = 1.05;
    utter.pitch = 1.0;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
  };
})();
</script>

<!-- Agent Terminal Modal -->
<div class="term-bg" id="term-modal" onclick="if(event.target===this)closeTerm()">
  <div class="term-box">
    <div class="term-hdr">
      <div class="term-dot" id="term-dot" style="background:#808080"></div>
      <span class="term-title" id="term-title">agent:assistant</span>
      <button class="term-close" onclick="closeTerm()">&times;</button>
    </div>
    <div class="term-body" id="term-body">
      <span class="t-info">Click an agent in the activity bar to view their live session.</span>
    </div>
  </div>
</div>

<script>
// ─── Agent Terminal ─────────────────────────────────────
var _termAgent = null;
var _termInterval = null;
var DISPATCHER_URL = 'http://127.0.0.1:3102';

window.openTerm = function(agentId) {
  _termAgent = agentId;
  document.getElementById('term-modal').classList.add('open');
  document.getElementById('term-title').textContent = agentId;
  document.getElementById('term-body').innerHTML = '<span class="t-info">Loading...</span>';
  refreshTerm();
  if (_termInterval) clearInterval(_termInterval);
  _termInterval = setInterval(refreshTerm, 2000);
};

window.closeTerm = function() {
  document.getElementById('term-modal').classList.remove('open');
  _termAgent = null;
  if (_termInterval) { clearInterval(_termInterval); _termInterval = null; }
};

function refreshTerm() {
  if (!_termAgent) return;
  fetch(DISPATCHER_URL + '/stream/' + encodeURIComponent(_termAgent))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var dot = document.getElementById('term-dot');
      dot.style.background = data.status === 'running' ? '#25d366' : '#808080';
      document.getElementById('term-title').textContent = _termAgent + (data.elapsed_s ? ' — ' + data.elapsed_s + 's' : data.status === 'idle' ? ' — idle' : '');

      var body = document.getElementById('term-body');
      var h = '';
      (data.lines || []).forEach(function(line) {
        if (line.indexOf('[tool]') === 0) {
          h += '<div class="t-tool">' + escH(line) + '</div>';
        } else if (line.indexOf('[result]') === 0) {
          h += '<div class="t-result">' + escH(line) + '</div>';
        } else if (line.indexOf('[text]') === 0) {
          h += '<div class="t-text">' + escH(line) + '</div>';
        } else if (line.indexOf('[done]') === 0) {
          h += '<div class="t-done">' + escH(line) + '</div>';
        } else if (line.indexOf('[stderr]') === 0 || line.indexOf('[error]') === 0) {
          h += '<div class="t-err">' + escH(line) + '</div>';
        } else {
          h += '<div class="t-info">' + escH(line) + '</div>';
        }
      });
      body.innerHTML = h || '<span class="t-info">No output yet.</span>';
      body.scrollTop = body.scrollHeight;
    })
    .catch(function() {
      document.getElementById('term-body').innerHTML = '<span class="t-err">Cannot reach dispatcher at ' + DISPATCHER_URL + '</span>';
    });
}

function escH(s) { return s ? String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }

// ─── Live activity bar from store data ───────────────────
// Check for streaming/processing messages to know who's working
setInterval(function() {
  // Use store data — check for messages with status=streaming or status=processing
  fetch(API + '/query/ai:message?status=streaming&_limit=10')
    .then(function(r) { return r.json(); })
    .then(function(streamingMsgs) {
      var activeAgents = {};
      streamingMsgs.forEach(function(m) {
        if (m.agent_id) activeAgents[m.agent_id] = { status: 'running', since: m.created || m.updated_at };
      });

      // Update activity bar
      var agents = window._agents || [];
      var bar = document.getElementById('activity-bar');
      if (!bar || !agents.length) return;
      var h = '';
      agents.forEach(function(a) {
        var act = activeAgents[a.id] || agentActivity[a.id] || {};
        var isWorking = act.status === 'running' || act.status === 'streaming' || act.status === 'processing';
        var cls = isWorking ? 'working' : 'idle';
        var task = isWorking ? 'working...' : 'idle';
        h += '<div class="ab-agent ' + cls + '" style="cursor:pointer" title="' + a.id + '">';
        h += '<span class="ab-dot"></span>';
        h += '<strong>' + escH(a.name) + '</strong>';
        h += '<span class="ab-task">' + task + '</span>';
        h += '</div>';
      });
      bar.innerHTML = h;

      // Update Start/Stop buttons + connection status
      var anyRunning = Object.keys(activeAgents).length > 0;
      var startBtn = document.getElementById('btn-start');
      var stopBtn = document.getElementById('btn-stop');
      if (startBtn) startBtn.style.display = anyRunning ? 'none' : 'inline-block';
      if (stopBtn) stopBtn.style.display = anyRunning ? 'inline-block' : 'none';
    })
    .catch(function() {});
}, 3000);
</script>
