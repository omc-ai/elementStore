<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/elementStore

    # =========================================================================
    # TENANT ROUTER MIDDLEWARE
    # Extracts {tenant} from subdomain: {tenant}.arc3d.ai → X-Tenant-Id header
    #
    # Rules:
    #   acme.arc3d.ai     → X-Tenant-Id: acme
    #   demo.arc3d.ai     → X-Tenant-Id: demo
    #   arc3d.ai          → no header (root/admin domain, no tenant)
    #   api.arc3d.ai      → no header (reserved service subdomains)
    #   localhost         → no header (local development without tenant)
    #
    # Trusted source: this header is set by Apache and cannot be spoofed by
    # clients when running behind an internal proxy or when the header is
    # cleared before reaching PHP (see RequestHeader unset below).
    # =========================================================================
    RewriteEngine On

    # Clear any incoming X-Tenant-Id header to prevent spoofing
    RequestHeader unset X-Tenant-Id

    # Match single-segment subdomain on arc3d.ai (tenant subdomain)
    # Excludes: api, www, admin, static — reserved subdomains
    RewriteCond %{HTTP_HOST} ^([a-z0-9][a-z0-9\-]*)\.arc3d\.ai$ [NC]
    RewriteCond %1 !^(api|www|admin|static|dev|staging|mail|ftp)$ [NC]
    RewriteRule ^ - [E=ES_TENANT_ID:%1]
    RequestHeader set X-Tenant-Id "%{ES_TENANT_ID}e" env=ES_TENANT_ID

    <Directory /var/www/elementStore>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Route all requests to index.php
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php [QSA,L]
    </Directory>

    # CORS headers — handled by PHP (index.php) for dynamic origin checking.
    # Remove static Apache CORS to avoid double headers.
    # Header set Access-Control-Allow-Origin — set by PHP based on CORS_ALLOWED_ORIGINS env var
    Header set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header set Access-Control-Allow-Headers "Content-Type, Authorization"

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/elementstore_error.log
    CustomLog ${APACHE_LOG_DIR}/elementstore_access.log combined

    # Security headers
    Header set X-Content-Type-Options "nosniff"
    Header set X-Frame-Options "SAMEORIGIN"
    Header set X-XSS-Protection "1; mode=block"
</VirtualHost>
