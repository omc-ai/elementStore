# Docker Compose for Agura namespace integration
# This file runs elementStore within the Agura docker network
# Usage: docker compose -f docker-compose.agura.yml up -d
#
# Services:
#   - php: PHP 8.3 + Phalcon 5.8 backend API (port 19007 -> 9000)
#   - couchdb: CouchDB 3.3 document store (port 5984)
#   - ws: Node.js WebSocket server for real-time sync (port 19008 -> 3100)
#   - aic: AIC agent dispatcher (ws-dispatcher.js + claude CLI)

services:
  php:
    build:
      context: ./docker
      dockerfile: Dockerfile.fpm
    container_name: elementstore_php83
    restart: unless-stopped
    volumes:
      - code:/var/www
    ports:
      - "19007:9000"
    networks:
      default:
        aliases:
          - elementstore-php
    depends_on:
      couchdb:
        condition: service_healthy
    environment:
      - PHP_ENV=development
      - ES_ENV=${ES_ENV:-development}
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-elementstore}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-200}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "master.local:172.18.0.12"
    working_dir: /var/www/elementStore

  couchdb:
    image: couchdb:3.3
    container_name: elementstore_couchdb
    restart: unless-stopped
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-elementstore}
    networks:
      default:
        aliases:
          - elementstore-couchdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  ws:
    build:
      context: .
      dockerfile: docker/Dockerfile.ws
    container_name: elementstore_ws
    restart: unless-stopped
    ports:
      - "19008:3100"
    networks:
      default:
        aliases:
          - elementstore-ws
    environment:
      - WS_PORT=3100

  aic:
    build:
      context: .
      dockerfile: docker/Dockerfile.aic
    container_name: elementstore_aic
    restart: unless-stopped
    volumes:
      - code:/var/www
      - ${HOME}/.claude:/root/.claude:ro
    working_dir: /var/www/elementStore/apps/aic
    environment:
      - ES_URL=${ES_URL:-http://arc3d.master.local/elementStore}
      - WS_URL=${WS_URL:-ws://elementstore-ws:3100}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "arc3d.master.local:172.18.0.12"
    depends_on:
      - ws
    networks:
      default:
        aliases:
          - elementstore-aic

volumes:
  code:
    external: true
    name: agura_code
  couchdb_data:
    name: elementstore_couchdb_data

networks:
  default:
    external: true
    name: agura_default
