<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ElementStore — Visual Schema Designer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    #cy { width: 100%; height: 100vh; background: #0f172a; }
    .modal { animation: pop 0.3s ease-out; }
    @keyframes pop { from { transform: scale(0.9) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
    .toast { animation: slideUp 0.3s, slideDown 0.3s 2.7s forwards; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100">
  <div class="flex h-screen overflow-hidden">
    <!-- Left Sidebar -->
    <div class="w-72 bg-slate-900 border-r border-slate-700 flex flex-col">
      <div class="p-4 border-b border-slate-700">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-emerald-500 rounded-xl flex items-center justify-center text-white font-bold">ES</div>
          <div>
            <h1 class="text-2xl font-bold tracking-tight">ElementStore</h1>
            <p class="text-xs text-emerald-400">Visual Schema Designer</p>
          </div>
        </div>
      </div>
      <div class="p-4">
        <button onclick="newClass()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-medium flex items-center justify-center gap-2">
          <i class="fa-solid fa-plus"></i> New Class
        </button>
      </div>
      <div class="px-4 pb-2 text-xs uppercase tracking-widest text-slate-400">Classes</div>
      <div id="class-list" class="flex-1 overflow-auto px-2"></div>
      <div class="p-4 border-t border-slate-700 text-xs text-slate-400">
        <div class="flex gap-2">
          <button onclick="autoLayout()" class="flex-1 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl">Auto Layout</button>
          <button onclick="loadSchema()" class="flex-1 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl">Reload</button>
        </div>
      </div>
    </div>

    <!-- Graph -->
    <div class="flex-1 relative">
      <div id="cy" class="absolute inset-0"></div>
      <div class="absolute top-4 left-1/2 -translate-x-1/2 bg-slate-900 border border-slate-700 rounded-2xl px-6 py-2 flex items-center gap-4 shadow-2xl z-50 text-sm">
        Drag nodes • Click node = edit class • Click property card = full editor
      </div>
    </div>

    <!-- Right Inspector -->
    <div id="inspector" class="w-96 bg-slate-900 border-l border-slate-700 flex flex-col hidden">
      <div class="p-4 border-b border-slate-700 flex justify-between items-center">
        <div class="font-semibold" id="inspector-title"></div>
        <button onclick="closeInspector()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="flex-1 overflow-auto p-4 space-y-6" id="inspector-content"></div>
    </div>
  </div>

  <!-- New Class Modal -->
  <div id="new-class-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="bg-slate-900 rounded-3xl p-8 w-96 modal">
      <h2 class="text-2xl font-bold mb-6">Create New Class</h2>
      <input id="new-class-id" type="text" placeholder="class_id (e.g. order)" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 mb-4 outline-none">
      <input id="new-class-name" type="text" placeholder="Display Name" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 mb-6 outline-none">
      <div class="flex gap-3">
        <button onclick="hideModal()" class="flex-1 py-3 rounded-2xl border border-slate-700">Cancel</button>
        <button onclick="createClassConfirm()" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl">Create</button>
      </div>
    </div>
  </div>

  <!-- Full Property Editor Modal -->
  <div id="prop-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[110]">
    <div class="bg-slate-900 rounded-3xl w-full max-w-2xl mx-4 modal max-h-[95vh] overflow-hidden flex flex-col">
      <div class="p-6 border-b border-slate-700 flex justify-between items-center">
        <h2 class="text-2xl font-bold" id="prop-modal-title">Edit Property</h2>
        <button onclick="closePropModal()" class="text-3xl text-slate-400 hover:text-white">×</button>
      </div>
      <div class="flex-1 overflow-auto p-6 space-y-6" id="prop-form"></div>
      <div class="p-6 border-t border-slate-700 flex gap-3">
        <button onclick="deleteCurrentProp()" class="flex-1 py-3 bg-red-600 hover:bg-red-500 rounded-2xl font-medium">Delete Property</button>
        <button onclick="closePropModal()" class="flex-1 py-3 border border-slate-700 hover:bg-slate-800 rounded-2xl">Cancel</button>
        <button onclick="saveProp()" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-medium">Save Property</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-2 toast"></div>

  <script src="js/visual-designer.js"></script>
</body>
</html>
