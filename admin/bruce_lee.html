// === PRE-RENDER CHARSET TILES ===
// Game uses multicolor char mode: 2 bits per pixel, 4 pixels wide x 8 tall
// Colors: 00=BG(12=grey), 01=screen color(from color RAM), 10=MC1(2=red), 11=MC2(1=white)
const charCanvases=new Array(256);
const BG_COL=12, MC1_COL=2, MC2_COL=1;

function renderChar(ch,fgCol){
  const tc=document.createElement('canvas');
  tc.width=8;tc.height=8;
  const tx=tc.getContext('2d');
  const id=tx.createImageData(8,8);
  for(let row=0;row<8;row++){
    const b=CHARSET[ch*8+row];
    for(let px=0;px<4;px++){
      const bits=(b>>(6-px*2))&3;
      let ci;
      if(bits===0) ci=BG_COL;
      else if(bits===1) ci=fgCol;
      else if(bits===2) ci=MC1_COL;
      else ci=MC2_COL;
      const x=px*2, off=(row*8+x)*4;
      id.data[off]=PR[ci];id.data[off+1]=PG[ci];id.data[off+2]=PB[ci];id.data[off+3]=255;
      id.data[off+4]=PR[ci];id.data[off+5]=PG[ci];id.data[off+6]=PB[ci];id.data[off+7]=255;
    }
  }
  tx.putImageData(id,0,0);
  return tc;
}

// Pre-render all chars with default foreground

// === SPRITE RENDERING ===
// Sprites are HIRES (1 bit per pixel), X-expanded (each pixel = 2px wide)
// 24 pixels wide x 21 rows, but X-expanded = 48px wide on screen
function renderSprite(blockNum,color){
  const tc=document.createElement('canvas');
  tc.width=48;tc.height=21;
  const tx=tc.getContext('2d');
  if(!(blockNum in SPRITE_MAP)) return tc;
  const off=SPRITE_MAP[blockNum];
  const ci=color&0xF;
  
  for(let row=0;row<21;row++){
    for(let bi=0;bi<3;bi++){
      const byte=SPRITE_RAW[off+row*3+bi];
      for(let bit=7;bit>=0;bit--){
        if(byte&(1<<bit)){
          const x=(bi*8+(7-bit))*2;
          tx.fillStyle=P[ci];
          tx.fillRect(x,row,2,1);
        }
      }
    }
  }
  return tc;
}

const GRAV=1.0,JUMP_VEL=-5.5,WALK_SPD=1.5,CLIMB_SPD=1.0;
const OX=32,OY=35; // Screen offset (border area)

// === INIT ===
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  if(state==='title'&&e.code==='Space'){initAudio();startGame()}
  if(e.code==='KeyP')paused=!paused;
});
document.addEventListener('keyup',e=>{keys[e.code]=false});

  // Bruce Lee sprites (color 7 = yellow) - blocks 6-14
  sprBruce.stand=renderSprite(8,7);  // Standing
  sprBruce.walk1=renderSprite(7,7);  // Walk frame 1
  sprBruce.walk2=renderSprite(12,7); // Walk frame 2
  sprBruce.jump=renderSprite(10,7);  // Jump/flying kick
  sprBruce.kick=renderSprite(9,7);   // Kick
  sprBruce.punch=renderSprite(13,7); // Punch
  sprBruce.climb=renderSprite(14,7); // Climb

  // Green Yamo (color 5 = green) - block 15+
  sprYamo.stand=renderSprite(15,5);
  sprYamo.walk1=renderSprite(15,5);
  sprYamo.walk2=renderSprite(15,5);
  sprYamo.jump=renderSprite(15,5);
  sprYamo.kick=renderSprite(15,5);
  sprYamo.punch=renderSprite(15,5);
  sprYamo.climb=renderSprite(15,5);

  // Ninja (color 0 = black) - blocks around 9
  sprNinja.stand=renderSprite(9,0);

  sprNinja.jump=renderSprite(10,0);

  sprNinja.punch=renderSprite(14,0);
  sprNinja.climb=renderSprite(14,0);

  // Lantern (color 7 = yellow)
  sprLantern=renderSprite(6,7);

function startGame(){
  state='play';room=0;score=0;lives=5;hp=3;
  loadRoom(0);
}

function loadRoom(r){
  room=r;
  const rm=ROOMS[r];
  lanterns=rm.n.map(n=>({x:n.x*8+4,y:n.y*8+4,collected:false,flash:0}));
  bruce.x=rm.s.x*8;bruce.y=rm.s.y*8-10;bruce.vx=0;bruce.vy=0;bruce.climb=false;bruce.atk=0;
  yamo.x=260;yamo.y=rm.p[0].y*8-20;yamo.alive=true;yamo.stun=0;yamo.resp=0;yamo.hp=3;
  ninja.x=130;ninja.y=rm.p[0].y*8-20;ninja.alive=true;ninja.stun=0;ninja.resp=0;ninja.hp=3;
}

// === PHYSICS ===
function checkGround(e){
  const rm=ROOMS[room];
  const fy=e.y+18;
  for(const p of rm.p){
    const py=p.y*8;
    if(fy>=py-2&&fy<=py+3){
      const cx=Math.floor((e.x+12)/8);
      if(cx>=p.x1&&cx<=p.x2){e.y=py-18;e.vy=0;e.ground=true;e.climb=false;return true}
    }
  }
  e.ground=false;return false;
}

function onLadder(x,y){
  const rm=ROOMS[room];
  const cx=Math.floor((x+20)/8),cy=Math.floor((y+10)/8);
  for(const l of rm.l) if(cx===l.x&&cy>=l.y1&&cy<=l.y2) return true;
  return false;
}

function onHazard(x,y){
  const rm=ROOMS[room];
  if(!rm.h)return false;
  const cx=Math.floor((x+20)/8),cy=Math.floor((y+14)/8);
  for(const h of rm.h) if(cy===h.y&&cx>=h.x1&&cx<=h.x2) return true;
  return false;
}

function updateEntity(e,isP){
  if(!e.alive){if(e.resp>0){e.resp--;if(e.resp===0){e.alive=true;e.hp=3;e.x=200;e.y=50;e.vy=0}}return}
  if(e.stun>0){e.stun--;e.x+=e.vx*0.4;e.vx*=0.92;if(!e.climb){e.vy+=GRAV;e.y+=e.vy}checkGround(e);return}
  if(e.inv>0)e.inv--;
  if(!e.climb){e.vy+=GRAV;e.y+=e.vy;if(e.y>220){if(isP)loseLife();else{e.alive=false;e.resp=100}return}checkGround(e)}
  e.x+=e.vx;if(e.x<0)e.x=0;if(e.x>290)e.x=290;
  if(e.atk>0)e.atk--;
}

function loseLife(){lives--;if(lives<=0){state='gameover';sndDeath()}else{hp=3;sndDeath();loadRoom(room)}}

// === PLAYER ===
function updateBruce(){
  bruce.vx=0;
  if(bruce.atk>0){updateEntity(bruce,true);return}
  if(keys.ArrowLeft){bruce.vx=-WALK_SPD;bruce.dir=-1}
  if(keys.ArrowRight){bruce.vx=WALK_SPD;bruce.dir=1}
  if(keys.ArrowUp&&onLadder(bruce.x,bruce.y)){bruce.climb=true;bruce.vy=-CLIMB_SPD;bruce.y+=bruce.vy}
  else if(keys.ArrowDown&&onLadder(bruce.x,bruce.y)){bruce.climb=true;bruce.vy=CLIMB_SPD;bruce.y+=bruce.vy}
  else if(bruce.climb&&!keys.ArrowUp&&!keys.ArrowDown)bruce.vy=0;
  if(bruce.climb&&!onLadder(bruce.x,bruce.y))bruce.climb=false;
  if(keys.Space&&bruce.ground&&!bruce.climb){bruce.vy=JUMP_VEL;bruce.ground=false;sndJump()}
  if(keys.KeyZ&&bruce.atk===0){bruce.atk=10;bruce.atkType='kick';sndKick();if(!bruce.ground)bruce.vx=bruce.dir*2.5}
  if(keys.KeyX&&bruce.atk===0){bruce.atk=7;bruce.atkType='punch';sndPunch()}
  if(bruce.vx!==0){bruce.wt++;if(bruce.wt>4){bruce.wt=0;bruce.wf=(bruce.wf+1)%2}}
  updateEntity(bruce,true);

  // Lanterns
  for(const la of lanterns){
    if(la.collected)continue;
    if(Math.abs(bruce.x+20-la.x)<14&&Math.abs(bruce.y+10-la.y)<14){
      la.collected=true;la.flash=15;score+=100;sndCollect()}}

  // Hazards
  if(onHazard(bruce.x,bruce.y)&&bruce.inv===0){hp--;bruce.inv=25;sndHit();bruce.stun=8;if(hp<=0){hp=3;loseLife()}}

  // Exit
  const rm=ROOMS[room];
  if(lanterns.every(l=>l.collected)){
    const ex=rm.e.x*8,ey=rm.e.y*8;
    if(Math.abs(bruce.x+20-ex)<14&&Math.abs(bruce.y+10-ey)<16){
      if(rm.victory){state='victory';return}
      loadRoom((room+1)%20)}}
}

// === ENEMY AI ===
function updateAI(e,spd){
  if(!e.alive||e.stun>0){updateEntity(e,false);return}
  const dx=bruce.x-e.x,dy=bruce.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<22&&e.atkT===0){e.atkT=25;if(bruce.inv===0){hp--;bruce.inv=25;sndHit();bruce.stun=6;bruce.vx=Math.sign(dx)*-2.5;if(hp<=0){hp=3;loseLife()}}}
  if(e.atkT>0)e.atkT--;
  if(Math.abs(dy)>14&&onLadder(e.x,e.y)){e.climb=true;e.vy=dy>0?CLIMB_SPD*spd:-CLIMB_SPD*spd;e.y+=e.vy;e.vx=0}
  else{e.climb=false;e.vx=dx>0?WALK_SPD*spd:-WALK_SPD*spd;e.dir=dx>0?1:-1}
  updateEntity(e,false);
}

function checkCombat(){
  if(bruce.atk<=0)return;
  const range=bruce.atkType==='kick'?26:14;
  const ax=bruce.x+(bruce.dir>0?24:-range+10);
  [yamo,ninja].forEach(e=>{
    if(!e.alive||e.stun>0)return;
    if(Math.abs(ax-e.x-20)<range&&Math.abs(bruce.y-e.y)<18){
      e.stun=15;e.vx=bruce.dir*3.5;e.vy=-2;sndHit();score+=50;
      e.hp--;if(e.hp<=0){e.alive=false;e.resp=100}}});
}

// === DRAWING ===
function drawRoom(){
  const rm=ROOMS[room];
  // Fill background
  bx.fillStyle=P[rm.c.bg];bx.fillRect(OX,OY,320,200);
  // Border
  bx.fillStyle=P[rm.c.border||0];
  bx.fillRect(0,0,W,OY);bx.fillRect(0,OY+200,W,H-OY-200);
  bx.fillRect(0,0,OX,H);bx.fillRect(OX+320,0,W-OX-320,H);

  // Draw room using charset tiles for platforms
  for(const p of rm.p){
    for(let x=p.x1;x<=p.x2;x++){
      // Platform top edge
      bx.drawImage(charCanvases[4],OX+x*8,OY+p.y*8-8);
      // Below platform fill
      if(p.y<24) bx.drawImage(charCanvases[16],OX+x*8,OY+p.y*8);
    }
  }
  // Ladders
  for(const l of rm.l){
    for(let y=l.y1;y<=l.y2;y++){
      // Draw ladder using charset pattern (vertical bars)
      bx.fillStyle=P[14]; // light blue
      bx.fillRect(OX+l.x*8+1,OY+y*8,2,8);
      bx.fillRect(OX+l.x*8+5,OY+y*8,2,8);
      if(y%2===0){bx.fillRect(OX+l.x*8,OY+y*8+3,8,2)}
    }
  }
  // Hazards
  if(rm.h){for(const h of rm.h){
    for(let x=h.x1;x<=h.x2;x++){
      bx.fillStyle=frame%4<2?P[14]:P[1];
      bx.fillRect(OX+x*8,OY+h.y*8-2,8,2);
      bx.fillStyle=frame%6<3?P[6]:P[14];
      bx.fillRect(OX+x*8,OY+h.y*8,8,2)}}}
  // Lanterns
  for(const la of lanterns){
    if(la.collected){if(la.flash>0){la.flash--;bx.fillStyle=P[1];bx.fillRect(OX+la.x-5,OY+la.y-5,10,10)}continue}
    // Draw using real lantern sprite
    bx.drawImage(sprLantern,OX+la.x-24,OY+la.y-10);
  }
  // Exit
  if(lanterns.every(l=>l.collected)){
    bx.fillStyle=frame%8<4?P[1]:P[7];
    bx.fillRect(OX+rm.e.x*8-1,OY+rm.e.y*8-1,10,10)}
}

function getSprFrame(e,spr){
  if(e.stun>0)return spr.stand;
  if(e.climb)return spr.climb;
  if(e.atk>0)return e.atkType==='kick'?spr.kick:spr.punch;
  if(!e.ground)return spr.jump;
  if(Math.abs(e.vx)>0.3)return e.wf===0?spr.walk1:spr.walk2;
  return spr.stand;
}

function drawSpr(e,spr){
  if(!e.alive)return;
  if(e.inv>0&&frame%3===0)return;
  const fr=getSprFrame(e,spr);
  const dx=e.dir<0?48:0;
  if(e.dir<0){
    bx.save();bx.translate(OX+e.x+48,OY+e.y);bx.scale(-1,1);bx.drawImage(fr,0,0);bx.restore();
  } else {
    bx.drawImage(fr,OX+e.x,OY+e.y);
  }
}

function drawHUD(){
  bx.fillStyle=P[0];bx.fillRect(OX,OY,320,10);
  bx.fillStyle=P[1];bx.font='8px monospace';
  bx.fillText(String(score).padStart(6,'0'),OX+8,OY+8);
  bx.fillText('TOP '+String(Math.max(score,0)).padStart(6,'0'),OX+110,OY+8);
  bx.fillText('FALLS '+String(lives).padStart(2,'0'),OX+240,OY+8);
  bx.fillText('RM'+(room+1),OX+295,OY+8);
  // HP bar
  for(let i=0;i<hp;i++){bx.fillStyle=P[5];bx.fillRect(OX+70+i*8,OY+2,6,5)}
}

function drawTitle(){
  bx.fillStyle=P[0];bx.fillRect(0,0,W,H);
  // Draw background using charset tiles
  for(let y=3;y<22;y++)for(let x=0;x<40;x++){
    const ch=(x*3+y*7+Math.floor(frame/8))%256;
    if(CHARSET[ch*8]||CHARSET[ch*8+1]){bx.globalAlpha=0.08;bx.drawImage(charCanvases[ch],OX+x*8,OY+y*8);bx.globalAlpha=1}}
  bx.fillStyle=P[7];bx.font='bold 28px monospace';bx.fillText('BRUCE LEE',OX+70,OY+60);
  bx.fillStyle=P[12];bx.font='10px monospace';bx.fillText('A Commodore 64 Recreation',OX+65,OY+85);
  bx.fillText('From the original 1984 Datasoft game',OX+30,OY+105);
  bx.fillStyle=frame%40<20?P[7]:P[0];bx.font='12px monospace';bx.fillText('PRESS SPACE TO START',OX+60,OY+140);
  bx.fillStyle=P[15];bx.font='8px monospace';
  bx.fillText('Arrows:Move  Space:Jump  Z:Kick  X:Punch',OX+10,OY+170);
  bx.fillText('P:Pause',OX+130,OY+185);
}

// === MAIN LOOP ===
function gameLoop(){
  frame++;
  if(state==='title'){drawTitle()}
  else if(state==='play'&&!paused){
    updateBruce();updateAI(yamo,0.55);updateAI(ninja,0.75);checkCombat();
    drawRoom();drawSpr(yamo,sprYamo);drawSpr(ninja,sprNinja);drawSpr(bruce,sprBruce);drawHUD();
  } else if(state==='play'&&paused){
    drawRoom();drawSpr(yamo,sprYamo);drawSpr(ninja,sprNinja);drawSpr(bruce,sprBruce);drawHUD();
    bx.fillStyle='rgba(0,0,0,0.5)';bx.fillRect(0,0,W,H);
    bx.fillStyle=P[1];bx.font='18px monospace';bx.fillText('PAUSED',OX+120,OY+100);
  } else if(state==='gameover'){
    bx.fillStyle=P[0];bx.fillRect(0,0,W,H);
    bx.fillStyle=P[2];bx.font='22px monospace';bx.fillText('GAME OVER',OX+90,OY+80);
    bx.fillStyle=P[1];bx.font='11px monospace';bx.fillText('Score: '+score,OX+120,OY+110);
    bx.fillStyle=frame%40<20?P[7]:P[0];bx.fillText('SPACE to restart',OX+90,OY+145);
    if(keys.Space){keys.Space=false;startGame()}
  } else if(state==='victory'){
    bx.fillStyle=P[6];bx.fillRect(0,0,W,H);
    bx.fillStyle=P[7];bx.font='22px monospace';bx.fillText('VICTORY!',OX+100,OY+70);
    bx.fillStyle=P[1];bx.font='11px monospace';bx.fillText('The fortress is conquered!',OX+60,OY+100);
    bx.fillText('Score: '+score,OX+120,OY+125);
    bx.fillStyle=frame%40<20?P[7]:P[6];bx.fillText('SPACE to play again',OX+75,OY+160);
    if(keys.Space){keys.Space=false;startGame()}
  }
  ctx.drawImage(buf,0,0,W,H,0,0,CW,CH);
}

// === START ===
initCharset();
initSprites();
setInterval(gameLoop,FPS_INTERVAL); // 50Hz PAL timing!
</script></body></html>
